name: Build TWRP
on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: TWRP Derle
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 10240
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip jq bc ccache liblz4-tool lzop rsync schedtool squashfs-tools python-is-python3
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo
          
      - name: Initialize TWRP Workspace
        run: |
          mkdir workspace
          cd workspace
          git config --global user.name "TWRP Builder"
          git config --global user.email "twrp@example.com"
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
          
      - name: Prepare Device Tree
        run: |
          mkdir -p workspace/device/infinix/X6710
          cp -r Android.bp Android.mk AndroidProducts.mk BoardConfig.mk README.md bootctrl device.mk prebuilt recovery recovery.fstab twrp_X6710.mk vendor.prop workspace/device/infinix/X6710/
          
      - name: Build TWRP
        run: |
          cd workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_X6710-eng
          mka vendorbootimage -j$(nproc --all)
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-X6710-${{ github.run_id }}
          path: workspace/out/target/product/X6710/vendor_boot.img
